<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fotballplanleggeren</title>
  <style>
    :root{--brand:#2d89ef;--bg:#f7f9fc;--card:#fff;--line:#e6eefc;--muted:#475569;--accent:#0f766e}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:var(--bg);margin:0;padding:18px;color:#0f172a}
    .wrap{max-width:1000px;margin:0 auto}
    header{display:flex;gap:12px;align-items:center;margin-bottom:14px}
    header img{height:44px;width:44px;object-fit:contain;border-radius:6px;background:#fff}
    h1{margin:0;font-size:1.25rem}
    .card{background:var(--card);padding:16px;border-radius:12px;box-shadow:0 6px 20px rgba(2,6,23,0.06)}
    .grid{display:grid;gap:10px}
    .grid.cols-2{grid-template-columns:1fr 1fr}
    .grid.cols-3{grid-template-columns:repeat(3,1fr)}
    .grid.cols-4{grid-template-columns:repeat(4,1fr)}
    label{font-weight:600;font-size:.95rem}
    textarea,input,select,button{width:100%;padding:8px;border-radius:8px;border:1px solid #d1d5db;font-size:0.95rem;font-family:inherit}
    textarea{min-height:64px}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    button.primary{background:var(--brand);color:#fff;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;width:auto}
    button.ghost{background:#f8fafc;border:1px solid #e6eefc;width:auto;cursor:pointer;padding:10px 14px}
    .table-wrap{overflow-x:auto;margin-top:12px}
    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{padding:8px;border:1px solid #eef2ff;text-align:center;font-size:0.92rem}
    th{background:#f8fafc}
    .slot-header td{background:#eef6ff;text-align:left;font-weight:700}
    .note{font-size:0.9rem;color:var(--muted);margin-top:10px}
    .summary{margin-top:14px;padding:12px;background:#f0fdfa;border-left:4px solid var(--accent);border-radius:6px;font-size:0.92rem}
    .summary table{margin-top:8px;background:transparent}
    .summary th,.summary td{border:none;text-align:left;padding:4px 8px;font-size:0.9rem}
    .warning{background:#fef3c7;border-left-color:#d97706}
    @media (max-width:640px){
      .grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
      .grid.cols-2{grid-template-columns:1fr}
      header{gap:8px}
      h1{font-size:1.05rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="logo.png" alt="Logo (bytt ut ved behov)">
      <div>
        <h1>Fotballplanleggeren ⚽</h1>
        <div style="font-size:0.9rem;color:var(--muted)">Generer kampoppsett og eksporter til Spond</div>
      </div>
    </header>

    <div class="card">
      <div class="grid">
        <div>
          <label for="teams">Lagnavn (ett per linje eller kommaseparert)</label>
          <textarea id="teams" placeholder="Åfoss G7&#10;Storm Blå&#10;Storm Hvit&#10;Storm Rød&#10;Skidar Sort&#10;Skidar Rød&#10;Gjerpen Rød&#10;Gjerpen Blå"></textarea>
        </div>
      </div>

      <div class="grid cols-4" style="margin-top:10px">
        <div>
          <label for="fields">Antall baner</label>
          <input id="fields" type="number" min="1" value="3">
        </div>
        <div>
          <label for="matchesPerTeam">Kamper per lag</label>
          <input id="matchesPerTeam" type="number" min="1" value="3">
        </div>
        <div>
          <label for="matchTime">Spilletid (min)</label>
          <input id="matchTime" type="number" min="1" value="15">
        </div>
        <div>
          <label for="pauseTime">Pause mellom slots (min)</label>
          <input id="pauseTime" type="number" min="0" value="3">
        </div>
      </div>

      <div class="grid cols-3" style="margin-top:10px">
        <div>
          <label for="dayType">Kampdager</label>
          <select id="dayType"><option value="weekday">Ukedager</option><option value="weekend">Helger</option></select>
        </div>
        <div>
          <label for="startDate">Ønsket startdato (valgfritt)</label>
          <input id="startDate" type="date">
        </div>
        <div>
          <label for="startTime">Starttid</label>
          <input id="startTime" type="time" value="17:00">
        </div>
      </div>

      <div style="margin-top:10px">
        <label for="excludedDates">Datoer som ikke passer (YYYY-MM-DD, kommaseparert)</label>
        <textarea id="excludedDates" placeholder="2026-05-13,2026-05-20"></textarea>
      </div>

      <div style="margin-top:10px">
        <label for="host">Kampvert / arrangør (for hele dagen)</label>
        <input id="host" type="text" placeholder="Navn på arrangør">
      </div>

      <div class="actions">
        <button class="primary" onclick="generateSchedule()">Generer kampoppsett</button>
        <button class="ghost" onclick="exportCSV()">Eksporter til Spond (CSV)</button>
        <button class="ghost" onclick="copyToSpond()">Kopier til Spond</button>
      </div>

      <div class="note" id="note">Algoritmen prøver å fordele kampene jevnt, slik at alle lag spiller ønsket antall kamper og venter minst mulig mellom kampene.</div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="table-wrap">
        <table id="scheduleTable" aria-live="polite">
          <thead>
            <tr><th>Dato</th><th>Tid</th><th>Bane</th><th>Lag A</th><th>Lag B</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="summary"></div>
    </div>
  </div>

  <script>
    const pad = n => (n < 10 ? '0' + n : '' + n);
    const isoDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    function parseExcluded(raw) {
      if (!raw) return [];
      return raw.split(',').map(s => s.trim()).filter(Boolean);
    }

    function getNextValidDate(fromDate, dayType, excluded) {
      let d = new Date(fromDate);
      while (true) {
        const iso = isoDate(d);
        const day = d.getDay();
        const blocked = excluded.includes(iso);
        const okDay = (dayType === 'weekday' && day >= 1 && day <= 5) || (dayType === 'weekend' && (day === 0 || day === 6));
        if (okDay && !blocked) return d;
        d.setDate(d.getDate() + 1);
      }
    }

    let matches = [];

    /**
     * Slot-basert kampgenerator.
     *
     * Strategi:
     * 1. Bygg en liste over alle mulige par (round-robin), sortert tilfeldig for variasjon.
     * 2. Iterer gjennom tidsslots. For hver slot, velg opptil `fields` kamper slik at:
     *    - Ingen lag spiller to kamper i samme slot.
     *    - Ingen lag overstiger `matchesPerTeam`.
     * 3. Prioriter lag som har spilt færrest kamper, for å fordele jevnt.
     * 4. Fortsett til alle lag har spilt ønsket antall kamper, eller til vi går tom for gyldige par.
     */
    function buildMatchPlan(teams, fields, matchesPerTeam) {
      // Generer alle mulige par
      const allPairs = [];
      for (let i = 0; i < teams.length; i++) {
        for (let j = i + 1; j < teams.length; j++) {
          allPairs.push({ a: teams[i], b: teams[j], used: false });
        }
      }

      const playCount = {};
      teams.forEach(t => playCount[t] = 0);

      const totalMatchesNeeded = Math.floor((teams.length * matchesPerTeam) / 2);
      const slots = [];
      let safetyCounter = 0;
      let totalScheduled = 0;

      while (totalScheduled < totalMatchesNeeded && safetyCounter < 100) {
        safetyCounter++;
        const slotMatches = [];
        const teamsBusyThisSlot = new Set();

        // For hver bane i denne sloten, finn beste par
        for (let f = 0; f < fields; f++) {
          if (totalScheduled >= totalMatchesNeeded) break;

          // Finn ledige par der ingen av lagene er opptatt eller har nådd grensen
          const candidates = allPairs.filter(p =>
            !p.used &&
            !teamsBusyThisSlot.has(p.a) &&
            !teamsBusyThisSlot.has(p.b) &&
            playCount[p.a] < matchesPerTeam &&
            playCount[p.b] < matchesPerTeam
          );

          if (candidates.length === 0) break;

          // Sorter: prioriter par der lagene har spilt færrest kamper
          candidates.sort((x, y) => {
            const xMin = Math.min(playCount[x.a], playCount[x.b]);
            const yMin = Math.min(playCount[y.a], playCount[y.b]);
            if (xMin !== yMin) return xMin - yMin;
            const xSum = playCount[x.a] + playCount[x.b];
            const ySum = playCount[y.a] + playCount[y.b];
            return xSum - ySum;
          });

          const chosen = candidates[0];
          chosen.used = true;
          teamsBusyThisSlot.add(chosen.a);
          teamsBusyThisSlot.add(chosen.b);
          playCount[chosen.a]++;
          playCount[chosen.b]++;
          slotMatches.push({ teamA: chosen.a, teamB: chosen.b, field: f + 1 });
          totalScheduled++;
        }

        if (slotMatches.length === 0) break; // Kan ikke planlegge flere — bryt
        slots.push(slotMatches);
      }

      return { slots, playCount, totalScheduled, totalMatchesNeeded };
    }

    function generateSchedule() {
      try {
        const rawTeams = (document.getElementById('teams').value || '').trim();
        const fields = Math.max(1, parseInt(document.getElementById('fields').value || '1', 10));
        const matchesPerTeam = Math.max(1, parseInt(document.getElementById('matchesPerTeam').value || '3', 10));
        const matchTime = Math.max(1, parseInt(document.getElementById('matchTime').value || '15', 10));
        const pauseTime = Math.max(0, parseInt(document.getElementById('pauseTime').value || '3', 10));
        const dayType = document.getElementById('dayType').value;
        const startDateStr = document.getElementById('startDate').value;
        const startTimeStr = document.getElementById('startTime').value || '17:00';
        const excluded = parseExcluded(document.getElementById('excludedDates').value);
        const [startHour, startMinute] = startTimeStr.split(':').map(n => parseInt(n, 10));

        if (!rawTeams) { alert('Skriv inn lag (minst 2).'); return; }
        const teams = rawTeams.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean);
        if (teams.length < 2) { alert('Skriv inn minst 2 lag.'); return; }

        if (matchesPerTeam >= teams.length) {
          alert(`Hvert lag kan maksimalt spille ${teams.length - 1} kamper (mot hvert av de andre lagene én gang).`);
          return;
        }

        let start = startDateStr ? new Date(startDateStr) : new Date();
        start.setHours(startHour, startMinute, 0, 0);
        start = getNextValidDate(start, dayType, excluded);
        start.setHours(startHour, startMinute, 0, 0);

        const maxParallel = Math.floor(teams.length / 2);
        const effectiveFields = Math.min(fields, maxParallel);
        const { slots, playCount, totalScheduled, totalMatchesNeeded } = buildMatchPlan(teams, effectiveFields, matchesPerTeam);

        matches = [];
        const tbody = document.querySelector('#scheduleTable tbody');
        tbody.innerHTML = '';

        const blockLenMs = (matchTime + pauseTime) * 60000;

        slots.forEach((slotMatches, slotIdx) => {
          const slotStart = new Date(start.getTime() + slotIdx * blockLenMs);
          const slotTimeStr = slotStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          // Slot-overskrift
          const headerRow = document.createElement('tr');
          headerRow.className = 'slot-header';
          const headerCell = document.createElement('td');
          headerCell.colSpan = 5;
          const playingTeams = new Set();
          slotMatches.forEach(m => { playingTeams.add(m.teamA); playingTeams.add(m.teamB); });
          const resting = teams.filter(t => !playingTeams.has(t));
          headerCell.textContent = `Slot ${slotIdx + 1} — ${slotTimeStr}` +
            (resting.length ? ` (Pause: ${resting.join(', ')})` : '');
          headerRow.appendChild(headerCell);
          tbody.appendChild(headerRow);

          slotMatches.forEach(sm => {
            const match = {
              date: isoDate(slotStart),
              time: slotTimeStr,
              field: sm.field,
              teamA: sm.teamA,
              teamB: sm.teamB,
              slot: slotIdx + 1
            };
            matches.push(match);

            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${match.date}</td><td>${match.time}</td><td>Bane ${match.field}</td><td>${match.teamA}</td><td>${match.teamB}</td>`;
            tbody.appendChild(tr);
          });
        });

        // Sammendrag
        const summaryEl = document.getElementById('summary');
        const incomplete = totalScheduled < totalMatchesNeeded;
        let summaryHTML = `<div class="summary${incomplete ? ' warning' : ''}">`;
        summaryHTML += `<strong>Sammendrag:</strong> ${totalScheduled} av ${totalMatchesNeeded} kamper planlagt over ${slots.length} tidsslots.`;
        if (incomplete) {
          summaryHTML += `<br><em>⚠ Algoritmen klarte ikke å planlegge alle ønskede kamper med disse parameterne. Prøv færre kamper per lag eller flere baner.</em>`;
        }
        summaryHTML += `<table><tr><th>Lag</th><th>Antall kamper</th></tr>`;
        teams.forEach(t => {
          summaryHTML += `<tr><td>${t}</td><td>${playCount[t]}</td></tr>`;
        });
        summaryHTML += `</table></div>`;
        summaryEl.innerHTML = summaryHTML;

        const noteEl = document.getElementById('note');
        const totalDurationMin = slots.length * (matchTime + pauseTime) - pauseTime;
        const restingPerSlot = teams.length - 2 * maxParallel;
        let noteText = `Maks samtidige kamper = ${maxParallel}` +
          (restingPerSlot > 0 ? ` (${restingPerSlot} lag har pause hver slot)` : '') +
          `. Total varighet: ca. ${totalDurationMin} min (${slots.length} slots à ${matchTime} min spill + ${pauseTime} min pause).`;
        if (fields > maxParallel) {
          noteText = `⚠ Du valgte ${fields} baner, men med ${teams.length} lag kan kun ${maxParallel} baner brukes samtidig (resten ville stått tomme). Bruker ${maxParallel} baner. ` + noteText;
        }
        noteEl.textContent = noteText;

        document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        console.error(err);
        alert('Noe gikk galt ved generering: ' + err.message);
      }
    }

    function exportCSV() {
      try {
        if (!matches || matches.length === 0) { alert('Generer først kampoppsettet.'); return; }
        const host = (document.getElementById('host').value || '').trim();
        const location = 'Fotballbanen';
        let desc = '';
        if (host) desc += `Kampvert: ${host}\n\n`;
        let currentSlot = 0;
        matches.forEach(m => {
          if (m.slot !== currentSlot) {
            currentSlot = m.slot;
            desc += `\nSlot ${currentSlot} (${m.time}):\n`;
          }
          desc += `Bane ${m.field}: ${m.teamA} vs ${m.teamB}\n`;
        });

        const title = 'Turneringsdag';
        const csvHeader = 'Tittel,Beskrivelse,Dato,Tid,Sted\n';
        const first = matches[0];
        const safe = s => s.replace(/"/g, '""');
        const csvRow = `"${safe(title)}","${safe(desc)}",${first.date},${first.time},"${safe(location)}"\n`;
        const blob = new Blob([csvHeader + csvRow], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'kampoppsett_spond.csv';
        a.click();
      } catch (err) {
        console.error(err);
        alert('Noe gikk galt ved eksport.');
      }
    }

    function copyToSpond() {
      try {
        if (!matches || matches.length === 0) { alert('Generer først kampoppsettet.'); return; }
        const host = (document.getElementById('host').value || '').trim();
        let text = '';
        if (host) text += `Kampvert: ${host}\n\n`;
        let currentSlot = 0;
        matches.forEach(m => {
          if (m.slot !== currentSlot) {
            currentSlot = m.slot;
            const [yyyy, mm, dd] = m.date.split("-");
            text += `\n${dd}-${mm} kl ${m.time}:\n`;
          }
          text += `Bane ${m.field}: ${m.teamA} vs ${m.teamB}\n`;
        });
        navigator.clipboard.writeText(text).then(() => {
          alert('Kampoppsett kopiert til utklippstavlen! Lim det inn i Spond.');
        });
      } catch (err) {
        console.error(err);
        alert('Klarte ikke å kopiere til utklippstavlen.');
      }
    }
  </script>
  <footer style="text-align:center; margin-top:40px; font-size:13px; color:#666;">
    Almenning Data - 2026
  </footer>
</body>
</html>
